  - Contains section "Protected Files" listing AGENTS.md, state files, brand docs
  - Contains section "Review Gate" — no auto-apply rule
  - Contains section "Rejection Rules" — 5 reject conditions defined
  - rg verify command exits 0 confirming all sections present

verification:
  - run: "rg -n 'Editable Files|Protected Files|Review Gate|Rejection Rules' docs/plans/HERMES_V2_1_SKILLOPT_GOVERNANCE.md"
