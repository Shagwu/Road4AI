<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Tireless is not aligned reel cover</title>
  <desc id="desc">A vertical Road4AI Reel and TikTok cover image with the message Tireless is not aligned.</desc>
  <defs>
    <style>
      .bg { fill: #f5f1e8; }
      .ink { fill: #111827; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #4b5563; font-family: Inter, Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #111827; stroke-width: 6; }
      .red { fill: #d84a3a; }
      .blue { fill: #2364aa; }
      .green { fill: #2a9d8f; }
      .yellow { fill: #f2c14e; }
      .line { stroke: #111827; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .headline { font-size: 112px; font-weight: 900; }
      .body { font-size: 46px; font-weight: 800; }
      .small { font-size: 34px; font-weight: 750; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1920"/>
  <text x="72" y="190" class="ink body">ROAD4AI / ACT 3</text>
  <text x="72" y="386" class="ink headline">Tireless</text>
  <text x="72" y="514" class="ink headline">is not</text>
  <text x="72" y="642" class="ink headline">aligned.</text>

  <rect x="72" y="760" width="936" height="470" rx="10" class="panel"/>
  <text x="118" y="870" class="ink body">"I don't have a plate."</text>
  <path d="M130 990h470M130 1060h360" class="line"/>
  <circle cx="820" cy="1008" r="74" fill="none" stroke="#2364aa" stroke-width="13"/>
  <path d="M820 954v58l48 32" class="line"/>
  <circle cx="708" cy="1120" r="24" class="red"/>
  <circle cx="772" cy="1120" r="24" class="yellow"/>
  <circle cx="836" cy="1120" r="24" class="green"/>

  <text x="74" y="1388" class="ink body">Wrong direction.</text>
  <text x="74" y="1452" class="ink body">Same energy.</text>
  <path d="M76 1534h760" class="line"/>
  <path d="M784 1478l72 56-72 56" fill="none" class="line"/>

  <text x="72" y="1760" class="muted small">Build the system. Stay the pilot.</text>
</svg>
