<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">The Self-Knowledge Pivot collage</title>
  <desc id="desc">A five-panel social collage showing the move from 10,000 noisy RAG chunks to 200 high-signal self-knowledge chunks.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .ink { fill: #111827; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #4b5563; font-family: Inter, Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #111827; stroke-width: 5; }
      .accent-red { fill: #d84a3a; }
      .accent-blue { fill: #2364aa; }
      .accent-green { fill: #2a9d8f; }
      .accent-yellow { fill: #f2c14e; }
      .line { stroke: #111827; stroke-width: 5; stroke-linecap: round; }
      .thin { stroke: #111827; stroke-width: 3; stroke-linecap: round; }
      .small { font-size: 30px; font-weight: 700; }
      .body { font-size: 35px; font-weight: 800; }
      .headline { font-size: 58px; font-weight: 900; }
      .kicker { font-size: 24px; font-weight: 800; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1080"/>
  <text x="60" y="78" class="ink headline">The self-knowledge pivot</text>
  <text x="64" y="120" class="muted small">More data made the agent louder. Better memory made it useful.</text>

  <rect x="60" y="165" width="455" height="245" rx="8" class="panel"/>
  <text x="90" y="216" class="ink kicker">ACT 1</text>
  <text x="90" y="280" class="ink headline">10,000</text>
  <text x="94" y="326" class="ink body">RAG chunks</text>
  <text x="94" y="370" class="muted small">looked impressive</text>
  <circle cx="430" cy="235" r="18" class="accent-red"/>
  <circle cx="460" cy="275" r="13" class="accent-blue"/>
  <circle cx="418" cy="318" r="11" class="accent-yellow"/>
  <circle cx="468" cy="350" r="16" class="accent-green"/>

  <rect x="565" y="165" width="455" height="245" rx="8" class="panel"/>
  <text x="595" y="216" class="ink kicker">THE PROBLEM</text>
  <text x="595" y="270" class="ink body">Retrieval worked.</text>
  <text x="595" y="318" class="ink body">Usefulness did not.</text>
  <line x1="600" y1="356" x2="970" y2="356" class="line"/>
  <text x="600" y="392" class="muted small">Noise at scale is still noise.</text>

  <rect x="60" y="455" width="455" height="245" rx="8" class="panel"/>
  <text x="90" y="506" class="ink kicker">THE MISS</text>
  <text x="90" y="560" class="ink body">It knew docs.</text>
  <text x="90" y="608" class="ink body">Not decisions.</text>
  <path d="M92 650h150M92 680h120M330 650h120M330 680h85" class="thin"/>
  <text x="90" y="724" class="muted small">Docs are not build memory.</text>

  <rect x="565" y="455" width="455" height="245" rx="8" class="panel"/>
  <text x="595" y="506" class="ink kicker">THE PIVOT</text>
  <text x="595" y="560" class="ink body">Index the build</text>
  <text x="595" y="608" class="ink body">history.</text>
  <rect x="603" y="640" width="72" height="28" rx="4" class="accent-blue"/>
  <rect x="693" y="640" width="112" height="28" rx="4" class="accent-green"/>
  <rect x="823" y="640" width="92" height="28" rx="4" class="accent-yellow"/>
  <text x="600" y="724" class="muted small">Commits. Checkpoints. Tradeoffs.</text>

  <rect x="60" y="745" width="960" height="245" rx="8" class="panel"/>
  <text x="90" y="798" class="ink kicker">THE LESSON</text>
  <text x="90" y="866" class="ink headline">200 signal chunks</text>
  <text x="90" y="924" class="ink body">beat 10,000 noisy ones.</text>
  <circle cx="855" cy="858" r="58" fill="none" stroke="#2a9d8f" stroke-width="10"/>
  <circle cx="855" cy="858" r="18" class="accent-green"/>
  <path d="M745 920c55 40 160 40 220 0" fill="none" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
  <text x="92" y="964" class="muted small">Your agent needs what you learned the hard way.</text>
</svg>
