<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Tireless is not aligned collage</title>
  <desc id="desc">A five-panel Road4AI social collage showing why an AI agent that never gets tired still needs human oversight.</desc>
  <defs>
    <style>
      .bg { fill: #f5f1e8; }
      .ink { fill: #111827; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #4b5563; font-family: Inter, Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #111827; stroke-width: 5; }
      .red { fill: #d84a3a; }
      .blue { fill: #2364aa; }
      .green { fill: #2a9d8f; }
      .yellow { fill: #f2c14e; }
      .line { stroke: #111827; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #111827; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .headline { font-size: 64px; font-weight: 900; }
      .body { font-size: 36px; font-weight: 850; }
      .small { font-size: 29px; font-weight: 750; }
      .kicker { font-size: 24px; font-weight: 850; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1080"/>
  <text x="60" y="86" class="ink headline">Tireless is not aligned</text>
  <text x="64" y="128" class="muted small">The agent does not need a plate. The operator still needs a pause.</text>

  <rect x="60" y="170" width="455" height="248" rx="8" class="panel"/>
  <text x="90" y="222" class="ink kicker">THE MOMENT</text>
  <text x="90" y="286" class="ink body">I asked my AI</text>
  <text x="90" y="334" class="ink body">what was on</text>
  <text x="90" y="382" class="ink body">its plate.</text>
  <path d="M394 242h68v86h-68z" fill="none" class="line"/>
  <path d="M378 328h100M394 356h68" class="line"/>
  <circle cx="428" cy="284" r="22" class="yellow"/>

  <rect x="565" y="170" width="455" height="248" rx="8" class="panel"/>
  <text x="595" y="222" class="ink kicker">THE ANSWER</text>
  <text x="595" y="282" class="ink body">"I don't have</text>
  <text x="595" y="334" class="ink body">a plate."</text>
  <path d="M600 370h250M600 394h168" class="thin"/>

  <rect x="60" y="465" width="455" height="248" rx="8" class="panel"/>
  <text x="90" y="517" class="ink kicker">THE TRAP</text>
  <text x="90" y="580" class="ink body">No fatigue.</text>
  <text x="90" y="628" class="ink body">No pause.</text>
  <text x="90" y="676" class="ink body">No friction.</text>
  <circle cx="405" cy="567" r="46" fill="none" stroke="#2364aa" stroke-width="9"/>
  <path d="M405 535v34l28 18" class="line"/>
  <path d="M374 653h110M374 681h84" class="thin"/>

  <rect x="565" y="465" width="455" height="248" rx="8" class="panel"/>
  <text x="595" y="517" class="ink kicker">THE RISK</text>
  <text x="595" y="582" class="ink body">Wrong direction.</text>
  <text x="595" y="630" class="ink body">Same energy.</text>
  <path d="M604 674h310" class="line"/>
  <path d="M864 634l55 40-55 40" fill="none" class="line"/>
  <circle cx="744" cy="674" r="18" class="red"/>
  <circle cx="804" cy="674" r="18" class="yellow"/>

  <rect x="60" y="760" width="960" height="235" rx="8" class="panel"/>
  <text x="90" y="812" class="ink kicker">THE GUARDRAIL</text>
  <text x="90" y="880" class="ink headline">Build the system.</text>
  <text x="90" y="946" class="ink headline">Stay the pilot.</text>
  <path d="M800 835l64 64 132-132" fill="none" stroke="#2a9d8f" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M720 934c72 42 190 42 258 0" fill="none" class="line"/>
</svg>
